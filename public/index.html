<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welltower Recruiter — Sign In</title>
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    body {
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .auth-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a2e44;
      margin: 0 0 4px;
    }
    .auth-logo p {
      color: #64748b;
      font-size: 0.9rem;
      margin: 0;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid #e2e8f0;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 500;
      color: #64748b;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .auth-tab.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    input:focus { border-color: #2563eb; }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .auth-error {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Welltower Recruiter</h1>
      <p>Recruiting Automation Platform</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Sign In</div>
      <div class="auth-tab" data-tab="register">Create Account</div>
    </div>

    <form class="auth-form active" id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      <div class="auth-error" id="login-error"></div>
    </form>

    <form class="auth-form" id="register-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="Jane Smith" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="At least 6 characters" required />
      </div>
      <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
      <div class="auth-error" id="register-error"></div>
    </form>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-form').classList.add('active');
      });
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value.trim(),
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errEl = document.getElementById('register-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('reg-name').value.trim(),
            email: document.getElementById('reg-email').value.trim(),
            password: document.getElementById('reg-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Registration failed';
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    // Redirect if already logged in
    fetch('/api/auth/me').then(res => {
      if (res.ok) window.location.href = '/dashboard';
    }).catch(() => {});
  </script>
</body>
</html>
