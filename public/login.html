<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruit Pro — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .back-link {
      position: fixed; top: 20px; left: 20px;
      font-size: 13px; color: #64748b; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color .2s;
    }
    .back-link:hover { color: #3b5bdb; }

    .auth-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 8px 40px rgba(59,91,219,.12);
      padding: 40px 36px; width: 100%; max-width: 440px;
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #3b5bdb, #845ef7);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 12px;
    }
    .auth-logo h1 { font-size: 20px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .auth-logo p { color: #64748b; font-size: 13px; }

    .auth-tabs {
      display: flex; border-bottom: 2px solid #e8ecf5; margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1; text-align: center; padding: 10px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: #94a3b8;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s;
    }
    .auth-tab.active { color: #3b5bdb; border-bottom-color: #3b5bdb; }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .15s; color: #1a1a2e;
    }
    input:focus { border-color: #3b5bdb; }

    /* Password field with show/hide toggle */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #94a3b8; display: flex; align-items: center;
    }
    .pw-toggle:hover { color: #3b5bdb; }
    .pw-toggle svg { width: 18px; height: 18px; }

    /* User type selector */
    .user-type-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 10px; display: block; }
    .user-type-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .user-type-option {
      display: flex; align-items: flex-start; gap: 12px;
      border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 12px 14px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .user-type-option:hover { border-color: #3b5bdb; background: #f8f9ff; }
    .user-type-option.selected { border-color: #3b5bdb; background: #eef2ff; }
    .user-type-option input[type="radio"] { display: none; }
    .uto-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
    .uto-text h4 { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
    .uto-text p { font-size: 12px; color: #64748b; line-height: 1.45; }

    .btn-primary {
      width: 100%; padding: 12px; background: #3b5bdb; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: background .15s; margin-top: 4px;
    }
    .btn-primary:hover { background: #2f4fcc; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .auth-error   { color: #dc2626; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
    .auth-success { color: #2f9e44; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }

    .divider { text-align: center; font-size: 12px; color: #94a3b8; margin: 16px 0; }

    .forgot-link {
      display: block; text-align: right; font-size: 12px; color: #3b5bdb;
      text-decoration: none; margin-top: -8px; margin-bottom: 16px; cursor: pointer;
    }
    .forgot-link:hover { text-decoration: underline; }

    .back-to-login {
      display: inline-block; font-size: 13px; color: #3b5bdb;
      cursor: pointer; margin-bottom: 20px; text-decoration: none;
    }
    .back-to-login:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="back-link" href="/">← Back to home</a>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎯</div>
      <h1>Recruit Pro</h1>
      <p>The smart outreach platform</p>
    </div>

    <div class="auth-tabs" id="main-tabs">
      <div class="auth-tab active" data-tab="login">Sign in</div>
      <div class="auth-tab" data-tab="register">Create account</div>
    </div>

    <!-- Login -->
    <form class="auth-form active" id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" placeholder="••••••••" required />
          <button type="button" class="pw-toggle" data-target="login-password" aria-label="Show password">
            <svg id="eye-login" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <span class="forgot-link" id="forgot-link">Forgot password?</span>
      <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
      <div class="auth-error" id="login-error"></div>
    </form>

    <!-- Register -->
    <form class="auth-form" id="register-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="Jane Smith" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="reg-password" placeholder="At least 6 characters" required />
          <button type="button" class="pw-toggle" data-target="reg-password" aria-label="Show password">
            <svg id="eye-reg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <span class="user-type-label">What best describes you?</span>
      <div class="user-type-grid" id="user-type-grid">
        <label class="user-type-option selected" data-value="recruiter_company">
          <input type="radio" name="userType" value="recruiter_company" checked>
          <span class="uto-icon">🏢</span>
          <div class="uto-text">
            <h4>In-House Recruiter</h4>
            <p>I hire talent for my company</p>
          </div>
        </label>
        <label class="user-type-option" data-value="recruiter_independent">
          <input type="radio" name="userType" value="recruiter_independent">
          <span class="uto-icon">🤝</span>
          <div class="uto-text">
            <h4>Independent Recruiter</h4>
            <p>I place talent for multiple client companies</p>
          </div>
        </label>
        <label class="user-type-option" data-value="career_consultant">
          <input type="radio" name="userType" value="career_consultant">
          <span class="uto-icon">🧭</span>
          <div class="uto-text">
            <h4>Career Consultant</h4>
            <p>I help professionals advance their careers</p>
          </div>
        </label>
      </div>

      <button type="submit" class="btn-primary" id="register-btn">Create account →</button>
      <div class="auth-error" id="register-error"></div>
    </form>

    <!-- Forgot password -->
    <div class="auth-form" id="forgot-form">
      <a class="back-to-login" id="back-from-forgot">← Back to sign in</a>
      <div class="form-group">
        <label for="forgot-email">Enter your account email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com" required />
      </div>
      <button type="button" class="btn-primary" id="forgot-btn">Send reset link</button>
      <div class="auth-error"   id="forgot-error"></div>
      <div class="auth-success" id="forgot-success"></div>
    </div>

    <!-- Reset password (shown via ?reset=TOKEN in URL) -->
    <div class="auth-form" id="reset-form">
      <div class="form-group">
        <label for="reset-password">New password</label>
        <div class="pw-wrap">
          <input type="password" id="reset-password" placeholder="At least 6 characters" required />
          <button type="button" class="pw-toggle" data-target="reset-password" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <button type="button" class="btn-primary" id="reset-btn">Set new password</button>
      <div class="auth-error"   id="reset-error"></div>
      <div class="auth-success" id="reset-success"></div>
    </div>
  </div>

  <script>
    // ── Helpers ──────────────────────────────────────────────────────────────
    const EYE_OPEN  = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    const EYE_SHUT  = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.966 9.966 0 012.212-3.592m3.286-2.413A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.966 9.966 0 01-1.655 2.905M15 12a3 3 0 11-4.5-2.598M3 3l18 18"/>`;

    function showPanel(id) {
      document.querySelectorAll('.auth-form').forEach(f => f.classList.toggle('active', f.id === id));
      const hideTabs = ['forgot-form','reset-form'].includes(id);
      document.getElementById('main-tabs').style.display = hideTabs ? 'none' : '';
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      showPanel(name + '-form');
      document.getElementById('main-tabs').style.display = '';
    }
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    const urlTab = new URLSearchParams(location.search).get('tab');
    if (urlTab === 'register') switchTab('register');

    // ── Password show/hide toggles ────────────────────────────────────────────
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.target);
        const showing = inp.type === 'text';
        inp.type = showing ? 'password' : 'text';
        btn.querySelector('svg').innerHTML = showing ? EYE_OPEN : EYE_SHUT;
      });
    });

    // ── User type selection ───────────────────────────────────────────────────
    document.querySelectorAll('.user-type-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.user-type-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        opt.querySelector('input').checked = true;
      });
    });

    // ── Login ─────────────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('login-email').value.trim(), password: document.getElementById('login-password').value })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Login failed'; btn.disabled = false; btn.textContent = 'Sign in'; return; }
        window.location.href = '/dashboard';
      } catch { errEl.textContent = 'Network error. Please try again.'; btn.disabled = false; btn.textContent = 'Sign in'; }
    });

    // ── Register ──────────────────────────────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errEl = document.getElementById('register-error');
      const selectedType = document.querySelector('input[name="userType"]:checked')?.value || 'recruiter_company';
      errEl.textContent = ''; btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('reg-name').value.trim(),
            email: document.getElementById('reg-email').value.trim(),
            password: document.getElementById('reg-password').value,
            userType: selectedType
          })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Registration failed'; btn.disabled = false; btn.textContent = 'Create account →'; return; }
        window.location.href = '/dashboard';
      } catch { errEl.textContent = 'Network error. Please try again.'; btn.disabled = false; btn.textContent = 'Create account →'; }
    });

    // ── Forgot password ───────────────────────────────────────────────────────
    document.getElementById('forgot-link').addEventListener('click', () => showPanel('forgot-form'));
    document.getElementById('back-from-forgot').addEventListener('click', () => switchTab('login'));

    document.getElementById('forgot-btn').addEventListener('click', async () => {
      const btn    = document.getElementById('forgot-btn');
      const errEl  = document.getElementById('forgot-error');
      const okEl   = document.getElementById('forgot-success');
      const email  = document.getElementById('forgot-email').value.trim();
      if (!email) { errEl.textContent = 'Enter your email address'; return; }
      errEl.textContent = ''; okEl.textContent = '';
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Failed to send reset link'; }
        else { okEl.textContent = 'Reset link sent — check your inbox (and spam folder).'; }
      } catch { errEl.textContent = 'Network error. Please try again.'; }
      btn.disabled = false; btn.textContent = 'Send reset link';
    });

    // ── Reset password (from email link ?reset=TOKEN) ─────────────────────────
    const resetToken = new URLSearchParams(location.search).get('reset');
    if (resetToken) {
      showPanel('reset-form');
    }

    document.getElementById('reset-btn').addEventListener('click', async () => {
      const btn    = document.getElementById('reset-btn');
      const errEl  = document.getElementById('reset-error');
      const okEl   = document.getElementById('reset-success');
      const pw     = document.getElementById('reset-password').value;
      if (!pw || pw.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }
      errEl.textContent = ''; okEl.textContent = '';
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, password: pw })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Reset failed — link may have expired'; }
        else {
          okEl.textContent = 'Password updated! Redirecting to sign in…';
          setTimeout(() => { window.location.href = '/login'; }, 2000);
        }
      } catch { errEl.textContent = 'Network error. Please try again.'; }
      btn.disabled = false; btn.textContent = 'Set new password';
    });

    // ── Redirect if already logged in ─────────────────────────────────────────
    if (!resetToken) {
      fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/dashboard'; }).catch(() => {});
    }
  </script>
</body>
</html>
